<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>21 Day Challenge | BWWL</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .hero {
            background: linear-gradient(135deg, rgba(230, 20, 105, 0.8), rgba(0, 0, 0, 0.9));
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 3px solid #e61469;
        }

        .hero h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .day-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .day-panel {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        .day-header {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: #1a1a1a;
            transition: 0.3s;
        }

        .day-header:hover {
            background: #222;
        }

        .day-header h3 {
            margin: 0;
            font-size: 1.2rem;
            color: #fff;
        }

        .day-content {
            display: none;
            padding: 1.5rem;
            border-top: 1px solid #333;
            line-height: 1.6;
            color: #ccc;
        }

        .day-content.open {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .lock-icon {
            color: #555;
        }

        .unlock-icon {
            color: #e61469;
        }

        .complete-btn {
            background: #e61469;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 1.5rem;
            font-size: 1rem;
            transition: 0.3s;
        }

        .complete-btn:hover {
            background: #c20e56;
        }

        .complete-btn.done {
            background: #00FF00;
            color: #000;
            cursor: default;
        }

        .day-panel.completed .day-header h3 {
            text-decoration: line-through;
            color: #888;
        }

        .day-panel.completed .day-header {
            border-left: 4px solid #00FF00;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="hero">
        <h1>21-Day Motivation & Consistency</h1>
        <p style="color:#ddd; margin-top:10px;">Complete one task per day. Unlock the next.</p>
    </div>

    <div class="container">
        <div class="day-list" id="challenge-list">
            <!-- Injected via JS -->
        </div>
    </div>

    <script>
        const challenges = [
            { title: "Day 1: The 'Why' Declaration", task: "Write down exactly why you are doing this. Tape it to your bathroom mirror. Read it every morning." },
            { title: "Day 2: The Water Flush", task: "Before you drink coffee or eat anything, drink one full glass of water (16oz) immediately upon waking up." },
            { title: "Day 3: The 15-Minute Rule", task: "Set a timer for 15 minutes. For those 15 minutes, you must move. Go for a brisk walk. No phone checking." },
            { title: "Day 4: Remove The Enemy", task: "Take all tempting 'trigger' foods (cookies, chips, soda) and throw them in the trash. If it's in your house, you'll eat it." },
            { title: "Day 5: Sleep Optimization", task: "Turn off all screens 45 minutes before you go to bed tonight to optimize hunger hormones." },
            { title: "Day 6: The Protein Check", task: "Ensure every single meal today contains a solid source of protein." },
            { title: "Day 7: Gratitude Reflection", task: "You survived Week 1. Write down 3 things your body allowed you to do today that you are grateful for." }
            // Add remaining days conceptually
        ];

        // Fill out array to 21 for demonstration
        for (let i = 8; i <= 21; i++) {
            challenges.push({ title: `Day ${i}: Consistency Check`, task: "Continue executing your daily habits. Drink water, move for 30 minutes, prioritizing protein." });
        }

        const state = JSON.parse(localStorage.getItem('bwwl_21day')) || {};

        function render() {
            const list = document.getElementById('challenge-list');
            list.innerHTML = '';

            let html = '';
            challenges.forEach((ch, index) => {
                const dayNum = index + 1;
                const isCompleted = state[dayNum] === true;
                const isLocked = !isCompleted && dayNum > 1 && !state[dayNum - 1]; // Only unlock if previous is done

                html += `
                <div class="day-panel ${isCompleted ? 'completed' : ''}" id="panel-${dayNum}">
                    <div class="day-header" onclick="togglePanel(${dayNum}, ${isLocked})">
                        <h3>${ch.title}</h3>
                        ${isCompleted ? '<i class="fas fa-check-circle" style="color:#00FF00;"></i>' :
                        isLocked ? '<i class="fas fa-lock lock-icon"></i>' :
                            '<i class="fas fa-unlock unlock-icon"></i>'}
                    </div>
                    <div class="day-content" id="content-${dayNum}">
                        <p>${ch.task}</p>
                        ${isCompleted
                        ? `<button class="complete-btn done" disabled><i class="fas fa-check"></i> Completed</button>`
                        : `<button class="complete-btn" onclick="markComplete(${dayNum})">Mark as Complete</button>`
                    }
                    </div>
                </div>
                `;
            });
            list.innerHTML = html;
        }

        function togglePanel(dayNum, isLocked) {
            if (isLocked) {
                alert("You must complete the previous days first!");
                return;
            }
            const content = document.getElementById(`content-${dayNum}`);
            content.classList.toggle('open');
        }

        function markComplete(dayNum) {
            state[dayNum] = true;
            localStorage.setItem('bwwl_21day', JSON.stringify(state));
            render();
            // Automatically open next day if it exists
            if (challenges.length > dayNum) {
                setTimeout(() => {
                    document.getElementById(`content-${dayNum + 1}`).classList.add('open');
                    document.getElementById(`panel-${dayNum + 1}`).scrollIntoView({ behavior: "smooth", block: "center" });
                }, 500);
            }
        }

        render();
        // Open day 1 by default if nothing is completed
        if (!state[1]) {
            document.getElementById('content-1').classList.add('open');
        }
    </script>
</body>

</html>

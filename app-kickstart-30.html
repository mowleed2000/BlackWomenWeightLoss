<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>30 Day Kickstart OS | BWWL</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #050505;
            color: #fff;
            padding-bottom: 50px;
        }

        .app-header {
            background: linear-gradient(135deg, #FF007F, #6A0DAD);
            padding: 2rem;
            border-radius: 0 0 20px 20px;
            text-align: center;
        }

        .progress-container {
            background: #1a1a1a;
            padding: 1.5rem;
            border-radius: 12px;
            margin: -30px auto 2rem;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            border: 1px solid #333;
        }

        .progress-bar-bg {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #FF007F, #6A0DAD);
            width: 0%;
            transition: width 0.4s ease;
        }

        .day-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .day-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .day-card.active {
            border-color: #FF007F;
            background: rgba(255, 0, 127, 0.1);
        }

        .day-card.completed {
            border-color: #00FF00;
            background: rgba(0, 255, 0, 0.05);
        }

        .day-card:hover {
            transform: translateY(-3px);
        }

        .task-list {
            max-width: 800px;
            margin: 2rem auto;
            background: #111;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #222;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item .check {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: transparent;
            transition: all 0.2s;
        }

        .task-item.done .check {
            background: #00FF00;
            border-color: #00FF00;
            color: #000;
        }

        .task-item.done span {
            text-decoration: line-through;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="app-header">
        <h1><i class="fas fa-bolt"></i> 30-Day Kickstart OS</h1>
        <p>Your interactive daily execution dashboard.</p>
    </div>

    <div class="container">
        <div class="progress-container">
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <h3 style="margin:0;">Kickstart Progress</h3>
                <span id="progress-text" style="font-weight:bold; color: #FF007F;">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <div class="text-center mb-4">
            <h2 id="current-day-title">Select a Day</h2>
        </div>

        <div class="day-grid" id="day-grid">
            <!-- Days injected via JS -->
        </div>

        <div class="task-list" id="task-list" style="display: none;">
            <!-- Tasks injected via JS -->
        </div>
    </div>

    <script>
        const totalDays = 30;
        const state = JSON.parse(localStorage.getItem('bwwl_kickstart')) || {};
        let selectedDay = 1;

        const tasks = [
            "Drink 2-3 liters of water",
            "Move for 30 minutes minimum",
            "Eat protein with every meal",
            "No liquid calories today"
        ];

        function init() {
            const grid = document.getElementById('day-grid');
            grid.innerHTML = '';
            let completedDays = 0;

            for (let i = 1; i <= totalDays; i++) {
                if (!state[i]) state[i] = { done: false, tasks: [false, false, false, false] };
                if (state[i].done) completedDays++;

                const dayEl = document.createElement('div');
                dayEl.className = `day-card ${state[i].done ? 'completed' : ''} ${selectedDay === i ? 'active' : ''}`;
                dayEl.innerHTML = `<h3 style="margin:0;">Day ${i}</h3><i class="fas ${state[i].done ? 'fa-check text-green' : 'fa-circle text-muted'} mt-2"></i>`;
                dayEl.onclick = () => selectDay(i);
                grid.appendChild(dayEl);
            }

            const percent = Math.round((completedDays / totalDays) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-text').innerText = percent + '%';
        }

        function selectDay(day) {
            selectedDay = day;
            document.getElementById('current-day-title').innerText = `Tasks for Day ${day}`;
            document.getElementById('task-list').style.display = 'block';

            const list = document.getElementById('task-list');
            list.innerHTML = '';

            tasks.forEach((task, index) => {
                const isTaskDone = state[day].tasks[index];
                const taskEl = document.createElement('div');
                taskEl.className = `task-item ${isTaskDone ? 'done' : ''}`;
                taskEl.innerHTML = `<div class="check"><i class="fas fa-check"></i></div><span>${task}</span>`;
                taskEl.onclick = () => toggleTask(day, index);
                list.appendChild(taskEl);
            });

            init(); // refresh grid highlight
            window.scrollTo({ top: document.getElementById('task-list').offsetTop - 50, behavior: 'smooth' });
        }

        function toggleTask(day, taskIndex) {
            state[day].tasks[taskIndex] = !state[day].tasks[taskIndex];

            // Check if all tasks done
            const allDone = state[day].tasks.every(t => t === true);
            state[day].done = allDone;

            localStorage.setItem('bwwl_kickstart', JSON.stringify(state));
            selectDay(day);
        }

        // Initialize
        init();
    </script>
</body>

</html>
